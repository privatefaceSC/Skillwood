<!DOCTYPE html>
<html>
<head>
    <title>Сообщения из Макс</title>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="5">
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 1500px; margin: 0 auto; }
        .message { background: white; margin: 10px 0; padding: 10px; border-radius: 8px; }
        .messenger_name { font-size: 12px; color: #888; }
        .sender { font-weight: bold; color: #007bff; }
        .time { font-size: 12px; color: gray; margin-left: 10px; }
        .text { margin-top: 5px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; text-decoration: none; margin-bottom: 20px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Сообщения из мессенджеров</h1>
            <a href="/" class="btn btn-primary">В главное меню</a>
        </div>

        <div id="messages">
            {% for msg in messages %}
            <div class="message">
                <div class="messenger_name">{{ msg.messenger_name }}</div>
                <div class="sender">{{ msg.sender }}</div>
                <div class="time">{{ msg.time }}</div>
                <div class="text">{{ msg.text }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
