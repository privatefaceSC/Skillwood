<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        // Применяем тему ДО загрузки стилей, чтобы не было мигания светлой темой.
        (function() {
            var stored = localStorage.getItem('theme');
            var dark = stored ? stored === 'dark'
                              : window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
        })();
    </script>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <title>{% block title %}Skillwood{% endblock %}</title>
    <style>
        body { background: #f5f6f8; }
        [data-bs-theme="dark"] body { background: #0f1115; }
        .navbar-brand { font-weight: 600; }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 600; flex: 0 0 auto;
        }
        #theme-toggle { width: 36px; padding: 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom shadow-sm mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Skillwood</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                {% if session.get('user_id') %}
                    <a class="btn btn-sm btn-primary" href="/contacts">Контакты</a>
                    <a class="btn btn-sm btn-outline-secondary" href="/contacts/manage">Связи</a>
                    <a class="btn btn-sm btn-outline-secondary" href="/admin/test">Тестер</a>
                    <a class="btn btn-sm btn-outline-danger" href="/logout">Выход</a>
                {% else %}
                    <a class="btn btn-sm btn-outline-primary" href="/login">Вход</a>
                    <a class="btn btn-sm btn-primary" href="/register">Регистрация</a>
                {% endif %}
                <button id="theme-toggle" class="btn btn-sm btn-outline-secondary"
                        title="Переключить тему" aria-label="Переключить тему">🌙</button>
            </div>
        </div>
    </nav>

    {% block body %}{% endblock %}

    <script>
        (function() {
            var btn = document.getElementById('theme-toggle');
            if (!btn) return;
            function sync() {
                var cur = document.documentElement.getAttribute('data-bs-theme');
                btn.textContent = cur === 'dark' ? '☀' : '🌙';
            }
            sync();
            btn.addEventListener('click', function() {
                var cur = document.documentElement.getAttribute('data-bs-theme');
                var next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-bs-theme', next);
                localStorage.setItem('theme', next);
                sync();
            });
        })();
    </script>
</body>
</html>
