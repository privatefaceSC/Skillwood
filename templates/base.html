<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <title>{% block title %}Skillwood{% endblock %}</title>
    <style>
        body { background: #f5f6f8; }
        .navbar-brand { font-weight: 600; }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 600; flex: 0 0 auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Skillwood</a>
            <div class="ms-auto d-flex gap-2">
                {% if session.get('user_id') %}
                    <a class="btn btn-sm btn-primary" href="/contacts">Контакты</a>
                    <a class="btn btn-sm btn-outline-secondary" href="/contacts/manage">Связи</a>
                    <a class="btn btn-sm btn-outline-secondary" href="/admin/test">Тестер</a>
                    <a class="btn btn-sm btn-outline-danger" href="/logout">Выход</a>
                {% else %}
                    <a class="btn btn-sm btn-outline-primary" href="/login">Вход</a>
                    <a class="btn btn-sm btn-primary" href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block body %}{% endblock %}
</body>
</html>
